# Hyperparameter-selection sweep for ngboost.
# This is not the final paper performance run.
# Run this config independently, then pass the resulting JSONL file to
# benchmarks/select_probabilistic_baseline_hyperparams.py select.
# The selection suite mirrors Treeffuser's development protocol: 4 synthetic
# diagnostics + 4 small real datasets, with fixed grids and paired seeds.

seeds:
  - 0
  - 1
  - 2
seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000
datasets:
  - name: heteroscedastic_gaussian_linear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: heteroscedastic_gaussian_nonlinear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: student_t_heavy_tail
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: bimodal_mixture
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: diabetes
    n_train: 300
    n_test: 142
  - name: california_housing
    n_train: 500
    n_test: 300
  - name: kin8nm
    n_train: 500
    n_test: 300
  - name: wine_quality_white
    n_train: 500
    n_test: 300
variants:
  - name: ngboost__lr0p02__est1000
    model: ngboost
    params:
      early_stopping_rounds: 50
      n_estimators: 1000
      learning_rate: 0.02
  - name: ngboost__lr0p05__est1000
    model: ngboost
    params:
      early_stopping_rounds: 50
      n_estimators: 1000
      learning_rate: 0.05
  - name: ngboost__lr0p1__est1000
    model: ngboost
    params:
      early_stopping_rounds: 50
      n_estimators: 1000
      learning_rate: 0.1
  - name: ngboost__lr0p02__est3000
    model: ngboost
    params:
      early_stopping_rounds: 50
      n_estimators: 3000
      learning_rate: 0.02
  - name: ngboost__lr0p05__est3000
    model: ngboost
    params:
      early_stopping_rounds: 50
      n_estimators: 3000
      learning_rate: 0.05
  - name: ngboost__lr0p1__est3000
    model: ngboost
    params:
      early_stopping_rounds: 50
      n_estimators: 3000
      learning_rate: 0.1
samplers:
  - n_samples: 200
    n_steps: 1
    n_parallel: 200
    method: euler
    pf_ode: false
    variants:
      - ngboost__lr0p02__est1000
      - ngboost__lr0p05__est1000
      - ngboost__lr0p1__est1000
      - ngboost__lr0p02__est3000
      - ngboost__lr0p05__est3000
      - ngboost__lr0p1__est3000
