# Hyperparameter-selection sweep for catboost_uncertainty.
# This is not the final paper performance run.
# Run this config independently, then pass the resulting JSONL file to
# benchmarks/select_probabilistic_baseline_hyperparams.py select.
# The selection suite mirrors Treeffuser's development protocol: 4 synthetic
# diagnostics + 4 small real datasets, with fixed grids and paired seeds.

seeds:
  - 0
  - 1
  - 2
seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000
datasets:
  - name: heteroscedastic_gaussian_linear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: heteroscedastic_gaussian_nonlinear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: student_t_heavy_tail
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: bimodal_mixture
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: diabetes
    n_train: 300
    n_test: 142
  - name: california_housing
    n_train: 500
    n_test: 300
  - name: kin8nm
    n_train: 500
    n_test: 300
  - name: wine_quality_white
    n_train: 500
    n_test: 300
variants:
  - name: catboost_uncertainty__d4__it3000__lr0p03
    model: catboost_uncertainty
    params:
      iterations: 3000
      early_stopping_rounds: 50
      thread_count: -1
      learning_rate: 0.03
      depth: 4
  - name: catboost_uncertainty__d6__it3000__lr0p03
    model: catboost_uncertainty
    params:
      iterations: 3000
      early_stopping_rounds: 50
      thread_count: -1
      learning_rate: 0.03
      depth: 6
  - name: catboost_uncertainty__d8__it3000__lr0p03
    model: catboost_uncertainty
    params:
      iterations: 3000
      early_stopping_rounds: 50
      thread_count: -1
      learning_rate: 0.03
      depth: 8
  - name: catboost_uncertainty__d4__it3000__lr0p05
    model: catboost_uncertainty
    params:
      iterations: 3000
      early_stopping_rounds: 50
      thread_count: -1
      learning_rate: 0.05
      depth: 4
  - name: catboost_uncertainty__d6__it3000__lr0p05
    model: catboost_uncertainty
    params:
      iterations: 3000
      early_stopping_rounds: 50
      thread_count: -1
      learning_rate: 0.05
      depth: 6
  - name: catboost_uncertainty__d8__it3000__lr0p05
    model: catboost_uncertainty
    params:
      iterations: 3000
      early_stopping_rounds: 50
      thread_count: -1
      learning_rate: 0.05
      depth: 8
  - name: catboost_uncertainty__d4__it3000__lr0p1
    model: catboost_uncertainty
    params:
      iterations: 3000
      early_stopping_rounds: 50
      thread_count: -1
      learning_rate: 0.1
      depth: 4
  - name: catboost_uncertainty__d6__it3000__lr0p1
    model: catboost_uncertainty
    params:
      iterations: 3000
      early_stopping_rounds: 50
      thread_count: -1
      learning_rate: 0.1
      depth: 6
  - name: catboost_uncertainty__d8__it3000__lr0p1
    model: catboost_uncertainty
    params:
      iterations: 3000
      early_stopping_rounds: 50
      thread_count: -1
      learning_rate: 0.1
      depth: 8
samplers:
  - n_samples: 200
    n_steps: 1
    n_parallel: 200
    method: euler
    pf_ode: false
    variants:
      - catboost_uncertainty__d4__it3000__lr0p03
      - catboost_uncertainty__d6__it3000__lr0p03
      - catboost_uncertainty__d8__it3000__lr0p03
      - catboost_uncertainty__d4__it3000__lr0p05
      - catboost_uncertainty__d6__it3000__lr0p05
      - catboost_uncertainty__d8__it3000__lr0p05
      - catboost_uncertainty__d4__it3000__lr0p1
      - catboost_uncertainty__d6__it3000__lr0p1
      - catboost_uncertainty__d8__it3000__lr0p1
