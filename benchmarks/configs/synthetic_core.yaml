# Recommended experimental variant: residualized_mean_edm_raw_time_log_std
# (residualize="mean" + score_parameterization="edm" + noise_features="raw_time_log_std").
# See benchmarks/README.md "Recommended Variant" for the 2026-05-12 decision runs.
# Library default remains residualize="off"; mean_scale stays experimental.

seeds: [0, 1, 2, 3, 4]

seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000

datasets:
  - name: homoscedastic_gaussian_linear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: heteroscedastic_gaussian_linear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: heteroscedastic_gaussian_nonlinear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: student_t_heavy_tail
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: skewed_noise
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: bimodal_mixture
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: correlated_multioutput
    n_train: 1000
    n_test: 1000
    x_dim: 3

variants:
  - name: baseline_raw_time
    params:
      score_parameterization: noise
      noise_features: raw_time
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: raw_time_log_std
    params:
      score_parameterization: noise
      noise_features: raw_time_log_std
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: x0_raw_time
    params:
      score_parameterization: x0
      noise_features: raw_time
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: x0_raw_time_log_std
    params:
      score_parameterization: x0
      noise_features: raw_time_log_std
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: edm_raw_time_log_std
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: residualized_mean_noise_raw_time_log_std
    params:
      score_parameterization: noise
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: residualized_mean_edm_raw_time_log_std
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: residualized_mean_scale_noise_raw_time_log_std
    params:
      score_parameterization: noise
      noise_features: raw_time_log_std
      residualize: mean_scale
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: residualized_mean_scale_edm_raw_time_log_std
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean_scale
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
# edm_sigma_data sweep (2026-05-12) confirmed default of 1.0 is optimal for
# standardized targets — values 0.25/0.5 catastrophically under-cover, 2.0
# widens with no gain. See results/raw/synthetic_core__*sigma_0p25*_20260512_180012.jsonl.

samplers:
  - n_samples: 200
    n_steps: 50
    n_parallel: 20
