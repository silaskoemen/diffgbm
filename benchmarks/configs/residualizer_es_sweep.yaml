# Residualizer early-stopping sweep on top of the new winning combo
# (EDM + residualize=mean + raw_time_log_std + t_sampling=log_sigma_normal).
#
# Compares fixed-budget configs (A current, C high-capacity) against early-stopped
# configs at two capacity points (D moderate, E high-cap). The 15%-of-fold inner-val
# gate (threshold = 50 rows) trips on diabetes (n=300, fold≈240, inner_val≈36) and
# falls back to the high-capacity defaults with a warning -- expected behavior.

seeds: [0, 1, 2]

seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000

datasets:
  - name: heteroscedastic_gaussian_linear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: heteroscedastic_gaussian_nonlinear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: student_t_heavy_tail
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: bimodal_mixture
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: diabetes
    n_train: 300
    n_test: 142
  - name: california_housing
    n_train: 500
    n_test: 300
  - name: kin8nm
    n_train: 500
    n_test: 300
  - name: wine_quality_white
    n_train: 500
    n_test: 300

variants:
  # A — current residualizer defaults (baseline).
  - name: resid_A_current
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      t_sampling: log_sigma_normal
      log_sigma_p_mean: -1.2
      log_sigma_p_std: 1.2
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  # C — empirically validated high-capacity (current bench recommendation for real data).
  - name: resid_C_high_capacity
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      t_sampling: log_sigma_normal
      log_sigma_p_mean: -1.2
      log_sigma_p_std: 1.2
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
      extra_residualizer_params:
        n_estimators: 300
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
  # D — early-stopped at moderate capacity. Auto-picks rounds under the current depth/leaf caps.
  - name: resid_D_es_moderate
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      t_sampling: log_sigma_normal
      log_sigma_p_mean: -1.2
      log_sigma_p_std: 1.2
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
      extra_residualizer_params:
        n_estimators: 2000
        learning_rate: 0.05
        max_depth: 6
        num_leaves: 31
        min_child_samples: 20
        early_stopping_rounds: 30
  # E — early-stopped at high capacity. Auto-picks rounds with lifted depth/leaf caps.
  - name: resid_E_es_high_capacity
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      t_sampling: log_sigma_normal
      log_sigma_p_mean: -1.2
      log_sigma_p_std: 1.2
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
      extra_residualizer_params:
        n_estimators: 2000
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
        early_stopping_rounds: 30

samplers:
  - n_samples: 200
    n_steps: 50
    n_parallel: 20
    method: euler
    pf_ode: false
