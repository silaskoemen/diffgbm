# Hyperparameter-selection sweep for deep_ensemble.
# This is not the final paper performance run.
# Run this config independently, then pass the resulting JSONL file to
# benchmarks/select_probabilistic_baseline_hyperparams.py select.
# The selection suite mirrors Treeffuser's development protocol: 4 synthetic
# diagnostics + 4 small real datasets, with fixed grids and paired seeds.

seeds:
  - 0
  - 1
  - 2
seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000
datasets:
  - name: heteroscedastic_gaussian_linear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: heteroscedastic_gaussian_nonlinear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: student_t_heavy_tail
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: bimodal_mixture
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: diabetes
    n_train: 300
    n_test: 142
  - name: california_housing
    n_train: 500
    n_test: 300
  - name: kin8nm
    n_train: 500
    n_test: 300
  - name: wine_quality_white
    n_train: 500
    n_test: 300
variants:
  - name: deep_ensemble__h50__lr0p001__ep150__ens3__layers1
    model: deep_ensemble
    params:
      max_epochs: 150
      learning_rate: 0.001
      batch_size: 256
      patience: 15
      n_ensembles: 3
      hidden_size: 50
      n_layers: 1
  - name: deep_ensemble__h50__lr0p001__ep150__ens3__layers2
    model: deep_ensemble
    params:
      max_epochs: 150
      learning_rate: 0.001
      batch_size: 256
      patience: 15
      n_ensembles: 3
      hidden_size: 50
      n_layers: 2
  - name: deep_ensemble__h100__lr0p001__ep150__ens3__layers1
    model: deep_ensemble
    params:
      max_epochs: 150
      learning_rate: 0.001
      batch_size: 256
      patience: 15
      n_ensembles: 3
      hidden_size: 100
      n_layers: 1
  - name: deep_ensemble__h100__lr0p001__ep150__ens3__layers2
    model: deep_ensemble
    params:
      max_epochs: 150
      learning_rate: 0.001
      batch_size: 256
      patience: 15
      n_ensembles: 3
      hidden_size: 100
      n_layers: 2
  - name: deep_ensemble__h50__lr0p001__ep150__ens5__layers1
    model: deep_ensemble
    params:
      max_epochs: 150
      learning_rate: 0.001
      batch_size: 256
      patience: 15
      n_ensembles: 5
      hidden_size: 50
      n_layers: 1
  - name: deep_ensemble__h50__lr0p001__ep150__ens5__layers2
    model: deep_ensemble
    params:
      max_epochs: 150
      learning_rate: 0.001
      batch_size: 256
      patience: 15
      n_ensembles: 5
      hidden_size: 50
      n_layers: 2
  - name: deep_ensemble__h100__lr0p001__ep150__ens5__layers1
    model: deep_ensemble
    params:
      max_epochs: 150
      learning_rate: 0.001
      batch_size: 256
      patience: 15
      n_ensembles: 5
      hidden_size: 100
      n_layers: 1
  - name: deep_ensemble__h100__lr0p001__ep150__ens5__layers2
    model: deep_ensemble
    params:
      max_epochs: 150
      learning_rate: 0.001
      batch_size: 256
      patience: 15
      n_ensembles: 5
      hidden_size: 100
      n_layers: 2
samplers:
  - n_samples: 200
    n_steps: 1
    n_parallel: 200
    method: euler
    pf_ode: false
    variants:
      - deep_ensemble__h50__lr0p001__ep150__ens3__layers1
      - deep_ensemble__h50__lr0p001__ep150__ens3__layers2
      - deep_ensemble__h100__lr0p001__ep150__ens3__layers1
      - deep_ensemble__h100__lr0p001__ep150__ens3__layers2
      - deep_ensemble__h50__lr0p001__ep150__ens5__layers1
      - deep_ensemble__h50__lr0p001__ep150__ens5__layers2
      - deep_ensemble__h100__lr0p001__ep150__ens5__layers1
      - deep_ensemble__h100__lr0p001__ep150__ens5__layers2
