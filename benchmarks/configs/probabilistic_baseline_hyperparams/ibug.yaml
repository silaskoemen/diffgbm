# Hyperparameter-selection sweep for ibug.
# This is not the final paper performance run.
# Run this config independently, then pass the resulting JSONL file to
# benchmarks/select_probabilistic_baseline_hyperparams.py select.
# The selection suite mirrors Treeffuser's development protocol: 4 synthetic
# diagnostics + 4 small real datasets, with fixed grids and paired seeds.

seeds:
  - 0
  - 1
  - 2
seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000
datasets:
  - name: heteroscedastic_gaussian_linear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: heteroscedastic_gaussian_nonlinear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: student_t_heavy_tail
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: bimodal_mixture
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: diabetes
    n_train: 300
    n_test: 142
  - name: california_housing
    n_train: 500
    n_test: 300
  - name: kin8nm
    n_train: 500
    n_test: 300
  - name: wine_quality_white
    n_train: 500
    n_test: 300
variants:
  - name: ibug__k50__leaf_sample_trees64__lr0p05__md3__est300
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 50
      n_estimators: 300
      max_depth: 3
  - name: ibug__k50__leaf_sample_trees64__lr0p05__md6__est300
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 50
      n_estimators: 300
      max_depth: 6
  - name: ibug__k50__leaf_sample_trees64__lr0p05__md3__est1000
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 50
      n_estimators: 1000
      max_depth: 3
  - name: ibug__k50__leaf_sample_trees64__lr0p05__md6__est1000
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 50
      n_estimators: 1000
      max_depth: 6
  - name: ibug__k100__leaf_sample_trees64__lr0p05__md3__est300
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 100
      n_estimators: 300
      max_depth: 3
  - name: ibug__k100__leaf_sample_trees64__lr0p05__md6__est300
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 100
      n_estimators: 300
      max_depth: 6
  - name: ibug__k100__leaf_sample_trees64__lr0p05__md3__est1000
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 100
      n_estimators: 1000
      max_depth: 3
  - name: ibug__k100__leaf_sample_trees64__lr0p05__md6__est1000
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 100
      n_estimators: 1000
      max_depth: 6
  - name: ibug__k200__leaf_sample_trees64__lr0p05__md3__est300
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 200
      n_estimators: 300
      max_depth: 3
  - name: ibug__k200__leaf_sample_trees64__lr0p05__md6__est300
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 200
      n_estimators: 300
      max_depth: 6
  - name: ibug__k200__leaf_sample_trees64__lr0p05__md3__est1000
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 200
      n_estimators: 1000
      max_depth: 3
  - name: ibug__k200__leaf_sample_trees64__lr0p05__md6__est1000
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 200
      n_estimators: 1000
      max_depth: 6
samplers:
  - n_samples: 200
    n_steps: 1
    n_parallel: 200
    method: euler
    pf_ode: false
    variants:
      - ibug__k50__leaf_sample_trees64__lr0p05__md3__est300
      - ibug__k50__leaf_sample_trees64__lr0p05__md6__est300
      - ibug__k50__leaf_sample_trees64__lr0p05__md3__est1000
      - ibug__k50__leaf_sample_trees64__lr0p05__md6__est1000
      - ibug__k100__leaf_sample_trees64__lr0p05__md3__est300
      - ibug__k100__leaf_sample_trees64__lr0p05__md6__est300
      - ibug__k100__leaf_sample_trees64__lr0p05__md3__est1000
      - ibug__k100__leaf_sample_trees64__lr0p05__md6__est1000
      - ibug__k200__leaf_sample_trees64__lr0p05__md3__est300
      - ibug__k200__leaf_sample_trees64__lr0p05__md6__est300
      - ibug__k200__leaf_sample_trees64__lr0p05__md3__est1000
      - ibug__k200__leaf_sample_trees64__lr0p05__md6__est1000
