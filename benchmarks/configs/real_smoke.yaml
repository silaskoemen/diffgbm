# Recommended experimental variant: residualized_mean_edm_raw_time_log_std
# (residualize="mean" + score_parameterization="edm" + noise_features="raw_time_log_std").
# See benchmarks/README.md "Recommended Variant" for the 2026-05-12 decision runs.
# Library default remains residualize="off"; mean_scale stays experimental.

seeds: [0, 1, 2, 3, 4]

seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000

datasets:
  - name: diabetes
    n_train: 300
    n_test: 142
  - name: california_housing
    n_train: 500
    n_test: 300
  - name: kin8nm
    n_train: 500
    n_test: 300
  - name: wine_quality_white
    n_train: 500
    n_test: 300

variants:
  - name: baseline_raw_time
    params:
      score_parameterization: noise
      noise_features: raw_time
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: raw_time_log_std
    params:
      score_parameterization: noise
      noise_features: raw_time_log_std
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: edm_raw_time_log_std
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: residualized_mean_noise_raw_time_log_std
    params:
      score_parameterization: noise
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: residualized_mean_edm_raw_time_log_std
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: residualized_mean_scale_noise_raw_time_log_std
    params:
      score_parameterization: noise
      noise_features: raw_time_log_std
      residualize: mean_scale
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: residualized_mean_scale_edm_raw_time_log_std
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean_scale
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: residualized_mean_edm_raw_time_log_std_minsnr1
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      loss_weighting: min_snr
      min_snr_gamma: 1.0
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: residualized_mean_edm_raw_time_log_std_minsnr5
    params:
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      loss_weighting: min_snr
      min_snr_gamma: 5.0
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1

samplers:
  - n_samples: 200
    n_steps: 50
    n_parallel: 20
    method: euler
    pf_ode: false
  - n_samples: 200
    n_steps: 50
    n_parallel: 20
    method: heun
    pf_ode: true
